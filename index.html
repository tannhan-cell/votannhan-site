<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VOTANNHAN.SITE - Linh Kiện Điện Tử</title>

<meta name="description" content="Cửa hàng linh kiện điện tử Arduino ESP32 giá rẻ tại Việt Nam">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<!-- HEADER -->
<header>
<div class="top-row">

<a href="#" class="logo" onclick="showHome()">
<i class="fas fa-microchip"></i>
<span class="logo-text">VOTANNHAN<span style="color:#333">.SITE</span></span>
</a>

<div class="search-bar">
<input id="searchInput" placeholder="Tìm linh kiện...">
<button onclick="searchProducts()">
<i class="fas fa-search"></i>
</button>
</div>

<div class="cart-box" onclick="toggleCart()">
<i class="fas fa-shopping-basket"></i>
<span id="cartCount">0</span>
</div>

</div>
</header>

<!-- NAV -->
<nav>
<ul>
<li onclick="showHome()">Trang chủ</li>
<li onclick="showAllProducts()">Sản phẩm</li>
<li onclick="showContact()">Liên hệ</li>
</ul>
</nav>

<!-- CONTENT -->
<main>

<div id="homePage">

<h2>Sản phẩm mới</h2>

<div class="grid" id="newProductsGrid"></div>

</div>

<div id="allProductsPage" style="display:none">

<h2 id="allCatTitle">Tất cả sản phẩm</h2>

<div class="grid" id="allProductsGrid"></div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
